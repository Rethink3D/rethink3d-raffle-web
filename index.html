<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>Rethink3D Raffle — Sorteio Gamificado</title>
    <meta name="description" content="Participe do sorteio gamificado da Rethink3D. Complete missões, acumule cupons e concorra a prêmios exclusivos de impressão 3D em tempo real." />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#7c3aed" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="Rethink3D Raffle — Sorteio Gamificado" />
    <meta property="og:description" content="Complete missões, acumule cupons e concorra a prêmios exclusivos de impressão 3D." />
    <meta property="og:locale"      content="pt_BR" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:title"       content="Rethink3D Raffle" />
    <meta name="twitter:description" content="Sorteio gamificado ao vivo com missões e prêmios 3D." />

    <!-- ─── FONTS: NON-BLOCKING (preconnect + preload swap) ───────────────── -->
    <!-- Step 1: preconnect to eliminate DNS + TLS latency -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!--
      Step 2: Load fonts as print media (non-blocking), then swap to all.
      This means fonts do NOT block FCP. Text renders immediately in
      fallback system font, then swaps when loaded.
    -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <!-- Fallback for no-JS -->
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&display=swap"
      />
    </noscript>

    <!-- Lottie Player Web Component (defer para não bloquear renderização) -->
    <script src="https://unpkg.com/@lottiefiles/lottie-player@2.0.8/dist/lottie-player.js" defer></script>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- ─── CRITICAL INLINE CSS (app shell visible before JS loads) ────────── -->
    <!--
      These styles make the HTML shell below visible instantly on any connection.
      They are intentionally minimal — just enough to show the branded loading state.
    -->
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        min-height: 100vh;
        background-color: #0a0a0f;
        background-image:
          linear-gradient(rgba(10, 10, 15, 0.88), rgba(10, 10, 15, 0.94)),
          url('/Background.webp');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        background-repeat: no-repeat;
        color: #a0a0b8;
        font-family: system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      /* Loading shell shown before React hydrates */
      #shell {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 2rem;
        text-align: center;
        gap: 1.5rem;
      }

      #shell-logo {
        font-size: 2.5rem;
        font-weight: 900;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: #ffffff;
      }

      #shell-logo span { color: #7c3aed; }

      #shell-sub {
        font-size: 0.65rem;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: #6182dc;
      }

      #shell-hint {
        font-size: 0.6rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: #3a3a5c;
      }

      /* Hide the shell once React root has content */
      #root:not(:empty) + * { display: none !important; }
    </style>
  </head>
  <body>
    <!-- React mounts here -->
    <div id="root"></div>

    <!--
      HTML Shell: visible immediately while JS downloads + executes.
      React will replace #root content, making this shell disappear naturally.
      This is what the user sees during the JS loading waterfall — gives FCP
      content instantly instead of a blank white page.
    -->
    <div id="shell" aria-hidden="true">
      <div id="shell-logo">RETHINK<span>3D</span></div>
      <div id="shell-sub">// Sorteio Gamificado</div>
      <lottie-player
        src="/Pokeball Loading.json"
        background="transparent"
        speed="1.2"
        style="width: 100px; height: 100px;"
        loop
        autoplay
      ></lottie-player>
      <div id="shell-hint">Iniciando sistema...</div>
    </div>

    <script>
      // Remove the shell as soon as React renders into #root
      (function() {
        var observer = new MutationObserver(function() {
          var root = document.getElementById('root');
          var shell = document.getElementById('shell');
          if (root && root.children.length > 0 && shell) {
            shell.style.display = 'none';
            observer.disconnect();
          }
        });
        observer.observe(document.getElementById('root'), { childList: true });
      })();
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
